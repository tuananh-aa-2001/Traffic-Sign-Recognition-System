# GTSRB Traffic Sign Recognition - Training Configuration

# Data settings
data:
  root_dir: "data/raw"
  processed_dir: "data/processed"
  image_size: 48  # Resize all images to 48x48
  num_classes: 43
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1

# Model settings
model:
  architecture: "resnet18"
  pretrained: false
  dropout: 0.5
  
# Training settings
training:
  batch_size: 128
  num_epochs: 50
  learning_rate: 0.001
  weight_decay: 0.0001
  num_workers: 4
  pin_memory: true
  
# Optimizer settings
optimizer:
  type: "adam"
  betas: [0.9, 0.999]
  
# Learning rate scheduler
scheduler:
  type: "reduce_on_plateau"
  mode: "max"
  factor: 0.5
  patience: 5
  min_lr: 0.00001
  
# Loss function
loss:
  type: "cross_entropy"
  label_smoothing: 0.1
  
# Data augmentation
augmentation:
  rotation_degrees: 15
  translation_percent: 0.1
  scale_range: [0.9, 1.1]
  brightness_factor: 0.2
  contrast_factor: 0.2
  gaussian_noise_std: 0.01
  apply_clahe: true
  
# Early stopping
early_stopping:
  patience: 10
  min_delta: 0.001
  
# Checkpointing
checkpoint:
  save_dir: "models/checkpoints"
  save_best_only: true
  monitor: "val_accuracy"
  mode: "max"
  
# Logging
logging:
  tensorboard_dir: "results/tensorboard"
  log_interval: 10  # Log every N batches
  
# Mixed precision training
mixed_precision:
  enabled: true
  
# Random seed for reproducibility
seed: 42
